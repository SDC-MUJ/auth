name: Auth
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@main

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          pyproject-file: "pyproject.toml"
          enable-cache: true

      - name: Run main.py
        env:
          X_GITHUB_TOKEN: ${{ secrets.X_GITHUB_TOKEN }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: uv run main.py

      - name: Sync deployment platform
        env:
          SYNC_PASSWORD: ${{ secrets.SYNC_PASSWORD }}
        run: |
          curl -X POST "https://deploy.sdcmuj.com/api/sync" -H "sync-password: ${SYNC_PASSWORD}" -H "Content-Type: application/x-yaml" --data-binary "@projects.yaml"
